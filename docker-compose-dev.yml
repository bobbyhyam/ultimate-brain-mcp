services:
  mcp:
    build: .
    ports:
      - "${MCP_PORT:-8000}:${MCP_PORT:-8000}"
    env_file: .env
    environment:
      MCP_TRANSPORT: streamable-http
      # MCP_HOST: 0.0.0.0
      # MCP_PORT: 8000

      # SSO authentication (optional — omit to run without auth)
      # Users will be redirected to this provider's login page in their browser.
      # OAUTH_ISSUER_URL: https://your-provider.example.com
      # OAUTH_CLIENT_ID: your-api-identifier
      # OAUTH_REQUIRED_SCOPES: read,write
